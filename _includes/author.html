<div class="flex flex-col items-center md:flex-row md:items-center gap-6 mb-12 md:mb-16 mt-16 md:mt-20 animate-fade-in-up">
  <div class="glass-card w-full p-6 md:p-8 flex flex-col md:flex-row items-center gap-6">
    <div class="relative shrink-0">
      <div class="absolute inset-0 rounded-full bg-accent/20 blur-xl animate-glow-pulse scale-150"></div>
      <img 
        class="relative w-20 h-20 rounded-full select-none border-2 border-white/20 dark:border-white/10 shadow-2xl" 
        src="{{ site.author.avatar }}" 
        alt="{{ site.author.name }}"
        loading="lazy"
      />
    </div>
    <div class="text-center md:text-left flex-1">
      <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-1 leading-tight">{{ site.author.name }}</h1>
      <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed max-w-lg">{{ site.author.bio }}</p>
    </div>
    <div class="flex items-center gap-3 shrink-0">
      {%- if site.author.github -%}
      <a href="https://github.com/{{ site.author.github }}" class="w-9 h-9 flex items-center justify-center rounded-lg bg-white/50 dark:bg-white/5 border border-white/20 hover:border-accent/40 hover:bg-accent/10 hover:text-accent transition-all duration-300" title="GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
      </a>
      {%- endif -%}
      {%- if site.author.twitter -%}
      <a href="https://twitter.com/{{ site.author.twitter }}" class="w-9 h-9 flex items-center justify-center rounded-lg bg-white/50 dark:bg-white/5 border border-white/20 hover:border-accent/40 hover:bg-accent/10 hover:text-accent transition-all duration-300" title="Twitter">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path></svg>
      </a>
      {%- endif -%}
      {%- if site.author.email -%}
      <a href="mailto:{{ site.author.email }}" class="w-9 h-9 flex items-center justify-center rounded-lg bg-white/50 dark:bg-white/5 border border-white/20 hover:border-accent/40 hover:bg-accent/10 hover:text-accent transition-all duration-300" title="Email">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
      </a>
      {%- endif -%}
    </div>
  </div>
</div>
