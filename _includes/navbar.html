<div class="sticky top-0 z-50 md:top-4 md:mt-4" role="navigation">
  <nav class="mx-auto max-w-wide px-4 relative">
    <!-- Checkbox Hack for Mobile Menu (Placed outside to avoid backdrop-filter clipping) -->
    <input type="checkbox" id="menu-trigger" class="menu-trigger hidden peer" />
    
    <div class="glass rounded-none md:rounded-2xl px-5 py-3 flex items-center justify-between relative z-20">
      
      <!-- Theme Toggle -->
      <a id="mode" class="relative w-5 h-5 cursor-pointer opacity-70 hover:opacity-100 active:scale-90 transition-all duration-200 select-none z-10 shrink-0">
        <svg class="mode-sunny w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <title>LIGHT</title>
          <line x1="256" y1="48" x2="256" y2="96" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-100 fill-none" />
          <line x1="256" y1="416" x2="256" y2="464" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-100 fill-none" />
          <line x1="403.08" y1="108.92" x2="369.14" y2="142.86" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-100 fill-none" />
          <line x1="142.86" y1="369.14" x2="108.92" y2="403.08" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-100 fill-none" />
          <line x1="464" y1="256" x2="416" y2="256" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-100 fill-none" />
          <line x1="96" y1="256" x2="48" y2="256" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-100 fill-none" />
          <line x1="403.08" y1="403.08" x2="369.14" y2="369.14" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-100 fill-none" />
          <line x1="142.86" y1="142.86" x2="108.92" y2="108.92" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-100 fill-none" />
          <circle cx="256" cy="256" r="80" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-100 fill-none" />
        </svg>
        <svg class="mode-moon w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <title>DARK</title>
          <line x1="256" y1="48" x2="256" y2="96" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-900 fill-none" />
          <line x1="256" y1="416" x2="256" y2="464" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-900 fill-none" />
          <line x1="403.08" y1="108.92" x2="369.14" y2="142.86" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-900 fill-none" />
          <line x1="142.86" y1="369.14" x2="108.92" y2="403.08" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-900 fill-none" />
          <line x1="464" y1="256" x2="416" y2="256" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-900 fill-none" />
          <line x1="96" y1="256" x2="48" y2="256" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-900 fill-none" />
          <line x1="403.08" y1="403.08" x2="369.14" y2="369.14" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-900 fill-none" />
          <line x1="142.86" y1="142.86" x2="108.92" y2="108.92" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="stroke-slate-900 fill-none" />
          <circle cx="256" cy="256" r="80" style="stroke-linecap:round;stroke-miterlimit:10;stroke-width:32px" class="fill-slate-900 stroke-slate-900" />
        </svg>
      </a>
      
      <div class="hidden md:flex items-center">
        {%- assign url = page.url -%}
        {%- assign menus = site.data.menus -%}
        <div class="flex items-center">
          {%- if menus %}
            {%- for menu in menus -%}
              <a class="menu-link inline-flex items-center justify-center text-sm tracking-wide px-3 py-1.5 transition-all duration-200 relative
                        {% if url == menu.url %}text-slate-900 dark:text-slate-100 font-semibold after:absolute after:bottom-0 after:left-1/2 after:-translate-x-1/2 after:w-4 after:h-0.5 after:bg-accent dark:after:bg-accent-dark after:rounded-full
                        {% else %}text-slate-700 dark:text-slate-300 opacity-70 hover:opacity-100{% endif %}" 
                 href="{{ menu.url }}" {% if menu.external %}target="_blank" rel="noopener"{% endif %}>
                {{ menu.title }}
              </a>
            {%- endfor -%}
          {%- endif -%}
          <a class="menu-link rss relative -bottom-0.5 outline-none opacity-70 hover:opacity-100 transition-opacity px-2" href="{{ '/feed.xml' | relative_url }}">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 512 512" fill="#ED812E">
              <path d="M108.56,342.78a60.34,60.34,0,1,0,60.56,60.44A60.63,60.63,0,0,0,108.56,342.78Z" />
              <path d="M48,186.67v86.55c52,0,101.94,15.39,138.67,52.11s52,86.56,52,138.67h86.66C325.33,312.44,199.67,186.67,48,186.67Z" />
              <path d="M48,48v86.56c185.25,0,329.22,144.08,329.22,329.44H464C464,234.66,277.67,48,48,48Z" />
            </svg>
          </a>
        </div>
      </div>

      <!-- Mobile Menu Toggle Button -->
      <label for="menu-trigger" class="md:hidden cursor-pointer z-10 order-last">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 512 512" class="fill-slate-900 dark:fill-slate-100 opacity-70 hover:opacity-100 transition-opacity">
          <path d="M64,384H448V341.33H64Zm0-106.67H448V234.67H64ZM64,128v42.67H448V128Z" />
        </svg>
      </label>
    </div>

    <!-- Mobile Menu Fullscreen Overlay -->
    <div class="fixed inset-0 z-10 hidden peer-checked:flex flex-col items-center justify-center 
                bg-white/95 dark:bg-slate-950/95 backdrop-blur-2xl transition-all duration-300">
      <div class="flex flex-col items-center gap-6">
        {%- if menus %}
          {%- for menu in menus -%}
            <a class="text-xl font-bold text-slate-900 dark:text-slate-100 no-underline" href="{{ menu.url }}">{{ menu.title }}</a>
          {%- endfor -%}
        {%- endif -%}
        <a class="rss mt-4" href="{{ '/feed.xml' | relative_url }}">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 512 512" fill="#ED812E">
            <path d="M108.56,342.78a60.34,60.34,0,1,0,60.56,60.44A60.63,60.63,0,0,0,108.56,342.78Z" />
            <path d="M48,186.67v86.55c52,0,101.94,15.39,138.67,52.11s52,86.56,52,138.67h86.66C325.33,312.44,199.67,186.67,48,186.67Z" />
            <path d="M48,48v86.56c185.25,0,329.22,144.08,329.22,329.44H464C464,234.66,277.67,48,48,48Z" />
          </svg>
        </a>
      </div>
      
      <!-- Close button (visual only, clicking anywhere on overlay background won't close but this helps UX) -->
      <label for="menu-trigger" class="absolute top-6 right-8 cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 512 512" class="fill-slate-900 dark:fill-slate-100">
          <path d="M400,145.49,366.51,112,256,222.51,145.49,112,112,145.49,222.51,256,112,366.51,145.49,400,256,289.49,366.51,400,400,366.51,289.49,256Z" />
        </svg>
      </label>
    </div>
  </nav>
</div>
