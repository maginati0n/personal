---
layout: compress
---
<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
{% include header.html %}

<body data-theme="{{ site.mode }}" class="notransition font-sans antialiased">
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5XNRRZNM"
  height="0" width="0" style="display:none;visibility:hidden" title="Google Tag Manager"></iframe></noscript>

  <script>
    const body = document.body;
    const data = body.getAttribute("data-theme");
    const initTheme = (state) => {
      if (state === "dark") {
        body.setAttribute("data-theme", "dark");
      } else if (state === "light") {
        body.removeAttribute("data-theme");
      } else {
        localStorage.setItem("theme", data);
      }
    };
    initTheme(localStorage.getItem("theme"));
    setTimeout(() => body.classList.remove("notransition"), 75);
  </script>

  <!-- Ambient Background Orbs -->
  <div class="bg-orb w-72 h-72 bg-accent/20 dark:bg-accent-dark/10 top-[10%] -left-36 animate-float"></div>
  <div class="bg-orb w-96 h-96 bg-amber-400/10 dark:bg-amber-500/5 top-[30%] -right-48 animate-float-slow"></div>
  <div class="bg-orb w-64 h-64 bg-orange-300/10 dark:bg-orange-400/5 bottom-[20%] left-1/4 animate-float" style="animation-delay: 2s;"></div>
  <div class="bg-orb w-80 h-80 bg-blue-500/10 dark:bg-blue-600/5 top-[60%] -left-40 animate-float-slow" style="animation-delay: 3s;"></div>
  <div class="bg-orb w-56 h-56 bg-purple-400/10 dark:bg-purple-500/5 bottom-[10%] -right-20 animate-float" style="animation-delay: 1s;"></div>

  {% include navbar.html %}
  <div class="wrapper {% if page.home or page.wide_layout %}wrapper-wide{% endif %}">
    {% include author.html %}
    <main aria-label="Content">
      {{ content }}
    </main>
    {% include footer.html %}
  </div>
</body>
</html>
