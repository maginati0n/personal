---
layout: compress
---
<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
{% include header.html %}

<body data-theme="{{ site.mode }}" class="notransition font-sans antialiased">
  <script>
    const body = document.body;
    const data = body.getAttribute("data-theme");
    const initTheme = (state) => {
      if (state === "dark") { body.setAttribute("data-theme", "dark"); }
      else if (state === "light") { body.removeAttribute("data-theme"); }
      else { localStorage.setItem("theme", data); }
    };
    initTheme(localStorage.getItem("theme"));
    setTimeout(() => body.classList.remove("notransition"), 75);
  </script>

  <!-- Ambient Background Orbs -->
  <div class="bg-orb w-72 h-72 bg-accent/25 dark:bg-accent-dark/15 top-20 -left-36 animate-float"></div>
  <div class="bg-orb w-80 h-80 bg-amber-400/15 dark:bg-amber-500/10 top-1/3 -right-40 animate-float-slow"></div>

  {% include navbar.html %}
  <div class="wrapper">
    <header class="mt-20 md:mt-28 mb-10 animate-fade-in">
      <h1 class="text-3xl md:text-[2em] leading-tight text-center text-slate-900 dark:text-slate-100" itemprop="headline">{{ page.title | escape }}.</h1>
    </header>
    <main class="page-content" aria-label="Content">
      {% include anchor_headings.html html=content anchorClass="anchor-head" beforeHeading=true h_min=4 h_max=4 %}
    </main>
    {% include footer.html %}
  </div>
</body>
</html>
